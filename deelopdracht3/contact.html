<header>
  <title>Contactformulier</title>
</header>
<body>

<div class="container py-5">
    <h2 class="mb-4 text-center">Neem contact op</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form id="contactForm" novalidate>
                <!-- Naam -->
                <div class="mb-3">
                    <label for="name" class="form-label">Naam</label>
                    <input type="text" class="form-control" id="name" name="name" required minlength="2">
                    <div class="invalid-feedback">Voer een geldige naam in (minimaal 2 tekens).</div>
                </div>

                <!-- E-mail -->
                <div class="mb-3">
                    <label for="email" class="form-label">E-mailadres</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                    <div class="invalid-feedback">Voer een geldig e-mailadres in.</div>
                </div>

                <!-- Bericht -->
                <div class="mb-3">
                    <label for="message" class="form-label">Bericht</label>
                    <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
                    <div class="invalid-feedback">Voer een bericht in.</div>
                </div>

                <!-- Verzenden -->
                <button type="submit" class="btn btn-primary w-100">Verstuur</button>
            </form>
        </div>
    </div>
</div>
</body>
<script>
    (function () {
        'use strict';
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function (event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        }, false);
    })();
</script>
